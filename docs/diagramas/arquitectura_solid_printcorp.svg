<svg width="100%" viewBox="0 0 1200 760" role="img" xmlns="http://www.w3.org/2000/svg" aria-labelledby="title desc">
  <title id="title">Arquitectura refactorizada PrintCorp - SOLID</title>
  <desc id="desc">Diagrama de interfaces, clases y nucleo. Muestra relaciones de implementacion y uso en el sistema PrintCorp.</desc>

  <defs>
    <style>
      .bg { fill: #0f172a; }
      .panel { fill: #111827; stroke: #334155; stroke-width: 1; }
      .panel-soft { fill: #0b1220; stroke: #263244; stroke-width: 1; }
      .title { fill: #f8fafc; font: 700 24px "Segoe UI", Arial, sans-serif; }
      .subtitle { fill: #94a3b8; font: 400 14px "Segoe UI", Arial, sans-serif; }
      .section { fill: #cbd5e1; font: 600 13px "Segoe UI", Arial, sans-serif; letter-spacing: 0.8px; }
      .node-title { fill: #e2e8f0; font: 600 14px "Segoe UI", Arial, sans-serif; }
      .node-meta { fill: #a7b3c7; font: 400 12px "Segoe UI", Arial, sans-serif; }
      .node-note { fill: #86efac; font: 400 11px "Segoe UI", Arial, sans-serif; }
      .iface { fill: #1e293b; stroke: #64748b; stroke-width: 1; rx: 10; }
      .class { fill: #172235; stroke: #3b82f6; stroke-width: 1; rx: 10; }
      .core { fill: #1a2230; stroke: #475569; stroke-width: 1; rx: 10; }
      .highlight { fill: #153b2f; stroke: #34d399; stroke-width: 1.3; rx: 10; }
      .impl-line { stroke: #93c5fd; stroke-width: 1.6; stroke-dasharray: 7 5; fill: none; marker-end: url(#implArrow); }
      .use-line { stroke: #f8fafc; stroke-width: 1.4; fill: none; marker-end: url(#useArrow); }
      .ocp-line { stroke: #34d399; stroke-width: 1.8; stroke-dasharray: 7 5; fill: none; marker-end: url(#implArrowGreen); }
      .legend { fill: #dbeafe; font: 500 12px "Segoe UI", Arial, sans-serif; }
      .caption { fill: #93c5fd; font: 500 11px "Segoe UI", Arial, sans-serif; }
    </style>

    <marker id="useArrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 1 1 L 9 5 L 1 9 z" fill="#f8fafc" />
    </marker>

    <marker id="implArrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 1 1 L 9 5 L 1 9" fill="none" stroke="#93c5fd" stroke-width="1.5" />
    </marker>

    <marker id="implArrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 1 1 L 9 5 L 1 9" fill="none" stroke="#34d399" stroke-width="1.6" />
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1200" height="760" />

  <rect class="panel" x="24" y="20" width="1152" height="720" rx="14" />
  <text class="title" x="52" y="58">PrintCorp refactorizado - vista de arquitectura SOLID</text>
  <text class="subtitle" x="52" y="82">Separacion por capas, contratos ISP y dependencias por abstraccion (DIP)</text>

  <rect class="panel-soft" x="52" y="108" width="1096" height="166" rx="12" />
  <text class="section" x="66" y="130">INTERFACES (ISP)</text>

  <rect class="iface" x="80" y="150" width="230" height="96" />
  <text class="node-meta" x="95" y="176">&lt;&lt;interface&gt;&gt;</text>
  <text class="node-title" x="95" y="198">Imprimible</text>
  <text class="node-meta" x="95" y="220">imprimir(Documento)</text>

  <rect class="iface" x="340" y="150" width="230" height="96" />
  <text class="node-meta" x="355" y="176">&lt;&lt;interface&gt;&gt;</text>
  <text class="node-title" x="355" y="198">Escaneable</text>
  <text class="node-meta" x="355" y="220">escanear(Documento)</text>

  <rect class="iface" x="600" y="150" width="230" height="96" />
  <text class="node-meta" x="615" y="176">&lt;&lt;interface&gt;&gt;</text>
  <text class="node-title" x="615" y="198">FaxCapaz</text>
  <text class="node-meta" x="615" y="220">enviarFax(numero, doc)</text>

  <rect class="iface" x="860" y="150" width="230" height="96" />
  <text class="node-meta" x="875" y="176">&lt;&lt;interface&gt;&gt;</text>
  <text class="node-title" x="875" y="198">Mantenible</text>
  <text class="node-meta" x="875" y="220">operaciones de hardware</text>

  <rect class="panel-soft" x="52" y="292" width="1096" height="190" rx="12" />
  <text class="section" x="66" y="314">CLASES CONCRETAS (LSP + OCP)</text>

  <rect class="class" x="120" y="340" width="280" height="110" />
  <text class="node-title" x="138" y="368">ImpresoraBasica</text>
  <text class="node-meta" x="138" y="390">implementa: Imprimible, Mantenible</text>
  <text class="node-meta" x="138" y="410">sin metodos no soportados</text>

  <rect class="class" x="450" y="340" width="320" height="110" />
  <text class="node-title" x="468" y="368">ImpresoraMultifuncional</text>
  <text class="node-meta" x="468" y="390">implementa: Imprimible, Escaneable</text>
  <text class="node-meta" x="468" y="410">FaxCapaz, Mantenible</text>

  <rect class="highlight" x="820" y="340" width="260" height="110" />
  <text class="node-title" x="838" y="368">EscanerEnLaNube</text>
  <text class="node-meta" x="838" y="390">implementa: Escaneable</text>
  <text class="node-note" x="838" y="412">extension OCP: sin modificar clases existentes</text>

  <rect class="panel-soft" x="52" y="500" width="760" height="210" rx="12" />
  <text class="section" x="66" y="522">NUCLEO E INFRAESTRUCTURA (SRP + DIP)</text>

  <rect class="core" x="80" y="548" width="170" height="88" />
  <text class="node-title" x="96" y="576">Documento</text>
  <text class="node-meta" x="96" y="598">entidad de datos</text>

  <rect class="core" x="272" y="548" width="170" height="88" />
  <text class="node-title" x="288" y="576">ColaImpresion</text>
  <text class="node-meta" x="288" y="598">FIFO simple</text>

  <rect class="core" x="464" y="548" width="190" height="88" />
  <text class="node-title" x="480" y="576">GestorImpresoras</text>
  <text class="node-meta" x="480" y="598">orquesta via interfaces</text>

  <rect class="core" x="676" y="548" width="110" height="88" />
  <text class="node-title" x="692" y="576">LogSistema</text>
  <text class="node-meta" x="692" y="598">registro</text>

  <rect class="panel-soft" x="836" y="500" width="312" height="210" rx="12" />
  <text class="section" x="850" y="522">LEYENDA</text>

  <line class="impl-line" x1="858" y1="552" x2="938" y2="552" />
  <text class="legend" x="948" y="556">Implementa interfaz</text>

  <line class="use-line" x1="858" y1="582" x2="938" y2="582" />
  <text class="legend" x="948" y="586">Usa / depende de</text>

  <line class="ocp-line" x1="858" y1="612" x2="938" y2="612" />
  <text class="legend" x="948" y="616">Nueva extension OCP</text>

  <text class="caption" x="858" y="650">DIP: el gestor depende de</text>
  <text class="caption" x="858" y="666">abstracciones (Imprimible / Escaneable)</text>

  <text class="caption" x="858" y="692">SRP: documento, cola y log</text>
  <text class="caption" x="858" y="708">mantienen responsabilidades separadas</text>

  <polyline class="impl-line" points="200,340 200,300 195,246" />
  <polyline class="impl-line" points="320,340 320,308 930,308 930,246" />

  <polyline class="impl-line" points="520,340 520,294 210,294 210,246" />
  <polyline class="impl-line" points="580,340 580,300 450,300 450,246" />
  <polyline class="impl-line" points="640,340 640,246" />
  <polyline class="impl-line" points="700,340 700,286 950,286 950,246" />

  <polyline class="ocp-line" points="950,340 950,270 470,270 470,246" />

  <line class="use-line" x1="464" y1="592" x2="442" y2="592" />
  <line class="use-line" x1="654" y1="592" x2="676" y2="592" />
  <line class="use-line" x1="272" y1="592" x2="250" y2="592" />

  <text class="caption" x="446" y="584">usa cola</text>
  <text class="caption" x="626" y="584">usa log</text>
  <text class="caption" x="252" y="584">contiene documento</text>
</svg>